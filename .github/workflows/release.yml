name: Release

on:
  push:
    tags:
      - '[0-9]+.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [create-release]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: houseabsolute/actions-rust-cross@fe6ede73c7f0a50412ec05994e2aa5a7bf635eac
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true
          use-rust-cache: false
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: claudebar
          target: ${{ matrix.target }}
          archive: claudebar-$tag-$target
          checksum: sha256
          include: README.md,LICENSE
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect checksum
        run: |
          sha256sum claudebar-*-${{ matrix.target }}.tar.gz \
            > claudebar-${{ matrix.target }}.sha256 2>/dev/null || \
          shasum -a 256 claudebar-*-${{ matrix.target }}.tar.gz \
            > claudebar-${{ matrix.target }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: claudebar-${{ matrix.target }}.sha256

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true
          path: checksums/
      - run: cat checksums/*.sha256 | sort > SHA256SUMS.txt
      - run: gh release upload "${{ github.ref_name }}" SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
