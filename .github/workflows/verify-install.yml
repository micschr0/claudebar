name: Verify install.sh

# Runs after every GitHub Release is published and actually executes
# install.sh end-to-end against that release's real assets — catches
# asset-naming mismatches (tag-in-filename, sums-file rename, etc.) that
# `install.sh` can silently 404 on, before a user hits them.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (defaults to latest)"
        required: false

jobs:
  verify-linux:
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run install.sh in a clean HOME
        run: |
          export HOME="$RUNNER_TEMP/verify-home"
          mkdir -p "$HOME"
          bash install.sh

          test -x "$HOME/.claude/claudebar"
          "$HOME/.claude/claudebar" --version
          echo '{}' | "$HOME/.claude/claudebar" render

  verify-macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run install.sh in a clean HOME
        run: |
          export HOME="$RUNNER_TEMP/verify-home"
          mkdir -p "$HOME"
          bash install.sh

          test -x "$HOME/.claude/claudebar"
          "$HOME/.claude/claudebar" --version
          echo '{}' | "$HOME/.claude/claudebar" render
