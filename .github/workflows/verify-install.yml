name: Verify install.sh

# Runs after every GitHub Release is published and actually executes
# install.sh end-to-end against that release's real assets — catches
# asset-naming mismatches (tag-in-filename, sums-file rename, etc.) that
# `install.sh` can silently 404 on, before a user hits them.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (defaults to latest)"
        required: false

permissions: {}

jobs:
  verify-linux:
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run install.sh in a clean HOME (no cargo — forces Tier 1)
        env:
          CLAUDEBAR_TARGET: ${{ matrix.target }}
          CLAUDEBAR_SKIP_SETUP: ${{ matrix.target == 'aarch64-unknown-linux-musl' && '1' || '' }}
        run: |
          export HOME="$RUNNER_TEMP/verify-home"
          mkdir -p "$HOME"

          # Strip cargo/rustc from PATH so a broken prebuilt download (Tier 1)
          # can't be silently masked by falling through to `cargo build` (Tier 2).
          export PATH=$(printf '%s' "$PATH" | tr ':' '\n' | grep -v '\.cargo/bin' | paste -s -d :)
          if command -v cargo >/dev/null 2>&1; then
            echo "cargo still on PATH: $(command -v cargo) — PATH stripping failed" >&2
            exit 1
          fi

          # Piped stdin execution (no BASH_SOURCE) — matches the documented
          # `curl | bash` usage and catches unbound-variable bugs that only
          # surface without a source file.
          cat install.sh | bash

          rm -rf "$HOME/.claude"
          mkdir -p "$HOME"

          bash install.sh

          test -x "$HOME/.claude/claudebar"

          # The runner is x86_64 — an aarch64 binary can't execute here without
          # emulation. CLAUDEBAR_TARGET only needs to prove the matching asset
          # downloads, verifies, and extracts; only run it when arch matches.
          if [ "$(uname -m)" = "x86_64" ] && [[ "${{ matrix.target }}" == x86_64-* ]]; then
            "$HOME/.claude/claudebar" --version
            echo '{}' | "$HOME/.claude/claudebar" render
          fi

  verify-macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run install.sh in a clean HOME (no cargo — forces Tier 1)
        run: |
          export HOME="$RUNNER_TEMP/verify-home"
          mkdir -p "$HOME"

          # Strip cargo/rustc from PATH so a broken prebuilt download (Tier 1)
          # can't be silently masked by falling through to `cargo build` (Tier 2).
          export PATH=$(printf '%s' "$PATH" | tr ':' '\n' | grep -v '\.cargo/bin' | paste -s -d :)
          if command -v cargo >/dev/null 2>&1; then
            echo "cargo still on PATH: $(command -v cargo) — PATH stripping failed" >&2
            exit 1
          fi

          # Piped stdin execution (no BASH_SOURCE) — matches the documented
          # `curl | bash` usage and catches unbound-variable bugs that only
          # surface without a source file.
          cat install.sh | bash

          rm -rf "$HOME/.claude"
          mkdir -p "$HOME"

          bash install.sh

          test -x "$HOME/.claude/claudebar"
          "$HOME/.claude/claudebar" --version
          echo '{}' | "$HOME/.claude/claudebar" render
