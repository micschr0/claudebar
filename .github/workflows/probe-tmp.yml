name: probe-tmp
on: workflow_dispatch

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout tap
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          repository: micschr0/homebrew-tap

      - name: Probe candidates
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          target="Formula/claudebar-beta.rb"

          echo "::group::environment"
          which brew ruby || true
          brew --version || echo "NO BREW"
          ruby --version || echo "NO RUBY"
          echo "::endgroup::"

          echo "::group::A: ruby -c (syntax only)"
          ruby -c "$target"; echo "exit=$?"
          echo "::endgroup::"

          echo "::group::B: brew audit by name (needs tap)"
          brew tap micschr0/tap "$PWD" 2>&1 | tail -3 || true
          brew audit --formula micschr0/tap/claudebar-beta 2>&1 | tail -15
          echo "exit=$?"
          echo "::endgroup::"

          echo "::group::C: brew info (real load through Formulary)"
          brew info --formula micschr0/tap/claudebar-beta 2>&1 | tail -15
          echo "exit=$?"
          echo "::endgroup::"

          echo "::group::D: does a bad class actually fail?"
          sed 's/^class ClaudebarBeta /class WrongName /' "$target" > /tmp/bad.rb
          cp /tmp/bad.rb "$(brew --repository micschr0/tap)/Formula/claudebar-beta.rb"
          echo "-- ruby -c on bad class:"
          ruby -c /tmp/bad.rb; echo "ruby_exit=$?"
          echo "-- brew info on bad class:"
          brew info --formula micschr0/tap/claudebar-beta 2>&1 | tail -8
          echo "info_exit=$?"
          echo "::endgroup::"
