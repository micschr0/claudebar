name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt, clippy, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout requires contents:read for actions/checkout
      pull-requests: write # scttnlsn/covrs posts PR comments and annotation
      checks: write       # and line-annotations as check runs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-auditable

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Clippy (render-only, no TUI)
        run: cargo clippy --locked --no-default-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features
        env:
          INSTA_UPDATE: no

      - name: Test (render-only, no TUI)
        run: cargo test --locked --no-default-features
        env:
          INSTA_UPDATE: no

      - name: Check release profile
        run: cargo check --release --locked


      - name: Check release profile (auditable)
        run: cargo auditable build --release --locked
      - name: Install dist (pinned to Cargo.toml cargo-dist-version)
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-dist@0.32.0
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-llvm-cov


      - name: Generate coverage data (lcov)
        run: cargo llvm-cov --locked --all-features --lcov --output-path lcov.info

      - name: Generate coverage HTML
        run: cargo llvm-cov --locked --all-features --html --output-dir target/llvm-cov/html

      - name: Coverage PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: scttnlsn/covrs@0a048b99b9b4b8aaa5d006d60caaf55c8a13c11d # v0.3.2
        with:
          coverage-files: lcov.info
          annotate: true

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-html
          path: target/llvm-cov/html/
          retention-days: 7

      - name: dist workflow drift check
        run: dist generate --check

  build-matrix:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Check release profile
        env:
          TARGET: ${{ matrix.target }}
        run: cargo check --release --locked --target $TARGET
