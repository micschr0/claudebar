name: rust

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt, clippy, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        # zizmor: ignore[stale-action-refs] 'stable' branch has no corresponding Git tag
        # zizmor: ignore[superfluous-actions] need rustup components (rustfmt, clippy)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable # zizmor: ignore[stale-action-refs]
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-auditable

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Clippy (render-only, no TUI)
        run: cargo clippy --locked --no-default-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features
        env:
          INSTA_UPDATE: no

      - name: Test (render-only, no TUI)
        run: cargo test --locked --no-default-features
        env:
          INSTA_UPDATE: no

      - name: Check release profile
        run: cargo check --release --locked


      - name: Check release profile (auditable)
        run: cargo auditable build --release --locked
      - name: Install dist (pinned to Cargo.toml cargo-dist-version)
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-dist@0.32.0

      - name: dist workflow drift check
        run: dist generate --check

  build-matrix:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        # zizmor: ignore[stale-action-refs] 'stable' branch has no corresponding Git tag
        # zizmor: ignore[superfluous-actions] need rustup components (rustfmt, clippy)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable # zizmor: ignore[stale-action-refs]
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Check release profile
        env:
          TARGET: ${{ matrix.target }}
        run: cargo check --release --locked --target $TARGET
