name: rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt, clippy, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Clippy (render-only, no TUI)
        run: cargo clippy --locked --no-default-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features
        env:
          INSTA_UPDATE: no

      - name: Test (render-only, no TUI)
        run: cargo test --locked --no-default-features
        env:
          INSTA_UPDATE: no

      - name: Check release profile
        run: cargo check --release --locked

      - name: Install dist (pinned to Cargo.toml cargo-dist-version)
        run: cargo install cargo-dist@0.32.0 --locked

      - name: dist workflow drift check
        run: dist generate --check
