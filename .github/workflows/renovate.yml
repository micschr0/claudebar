name: Renovate

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

# Default deny-all. Token for pushing commits/PRs comes from the GitHub App,
# not from GITHUB_TOKEN.
permissions: {}

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          owner: "micschr0"
          repositories: "claudebar"
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          GIT_AUTHOR_NAME: micschr0
          GIT_AUTHOR_EMAIL: 61987798+micschr0@users.noreply.github.com
          GIT_COMMITTER_NAME: micschr0
          GIT_COMMITTER_EMAIL: 61987798+micschr0@users.noreply.github.com
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
