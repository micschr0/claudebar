name: Benchmark

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Performance SLO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get install -y jq strace

      - name: Run benchmark (SLO check)
        run: bash scripts/benchmark.sh | tee benchmark-report.txt

      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: benchmark-report.txt
