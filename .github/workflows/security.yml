name: Security

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - docs/**
      - '**.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -S warning install.sh statusline-command.sh scripts/*.sh

  bats:
    name: Bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install bats + jq
        run: sudo apt-get install -y bats jq
      - name: Run bats
        run: bats tests/*.bats

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.167.0
    steps:
      - uses: actions/checkout@v7
      - name: Scan
        run: semgrep scan --config p/trailofbits --error *.sh scripts/*.sh

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: zizmor
      - run: zizmor .github/workflows/*.yml
