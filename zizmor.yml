rules:
  template-injection:
    ignore:
      # Auto-generated by cargo-dist — template-injection findings
      # can only be fixed upstream.
      - release.yml
  unpinned-images:
    ignore:
      # Auto-generated by cargo-dist — container image references
      # can only be pinned upstream.
      - release.yml
  artipacked:
    ignore:
      - release.yml
