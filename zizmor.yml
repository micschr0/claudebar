# zizmor — single source of truth for workflow suppressions.
# No inline `# zizmor: ignore[...]` comments in workflow files.
# All suppressions live here with rationale.

rules:
  # ---------- release.yml (cargo-dist generated) ----------
  #
  # Most template-injection findings have been fixed by moving
  # ${{ }} expressions into `env:` blocks. Two remain unfixable
  # without upstream cargo-dist changes:
  #
  #   release.yml:139 – matrix.install_dist.run as entire run command
  #   release.yml:149 – matrix.packages_install in run block
  #
  # Both inject matrix values built by cargo-dist from the tag name.
  # cargo-dist owns the matrix schema; we cannot safely refactor these.
  template-injection:
    ignore:
      - release.yml

  # container: ${{ matrix.container && matrix.container.image || null }}
  # The `null` fallback triggers unpinned-images. The actual images are
  # pinned by cargo-dist inside the matrix; `null` just means "no container."
  unpinned-images:
    ignore:
      - release.yml

  # release.yml downloads artifacts from previous plan jobs.
  # The artifact names are cargo-dist-managed; no user-controlled input.
  artipacked:
    ignore:
      - release.yml

  # ---------- rust.yml ----------
  #
  # dtolnay/rust-toolchain is pinned to a commit SHA.
  # The `# stable` comment on the `uses:` line is for humans only;
  # the action does not actually resolve a branch ref.
  stale-action-refs:
    ignore:
      - rust.yml

  # dtolnay/rust-toolchain installs rustup components (rustfmt, clippy)
  # that taiki-e/install-action does not provide. The two actions serve
  # different purposes and are not redundant.
  superfluous-actions:
    ignore:
      - rust.yml

# ---------- homebrew-app-token.yml (reusable workflow_call) ----------
#
# homebrew-app-token.yml is called by release.yml's custom-homebrew-app-token
# job. Adding any `permissions:` block here (workflow-level or job-level)
# causes the *caller* workflow to fail with startup_failure — the caller's
# `permissions: {}` strips GITHUB_TOKEN before it reaches the reusable
# workflow. Empirically verified across 3 remediation attempts.
#
# Actual security risk is nil:
#   - GITHUB_TOKEN is *never used* in this workflow
#   - All git operations use a short-lived, single-repo-scoped App token
#     (actions/create-github-app-token → micschr0/homebrew-tap, contents:write)
#   - Caller enforces `permissions: {}` at workflow level + per-job overrides
#   - This workflow only fires on tag push (release pipeline)
#
# The two warnings (homebrew-app-token.yml:1 and :16) flag that no
# permissions block exists, but the contract between caller and callee
# has been manually reviewed and is secure.
overly-broad-permissions:
  ignore:
    - homebrew-app-token.yml
