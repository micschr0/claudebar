<template id="scene-02-states-template">
  <div data-composition-id="scene-02-states" data-width="1920" data-height="1080">
    <div class="stack">
      <div class="stage">
        <div id="s-green"  class="layer"><img class="strip" src="public/screenshots/strip-green.png" alt="calm"></div>
        <div id="s-normal" class="layer"><img class="strip" src="public/screenshots/strip-normal.png" alt="normal"></div>
        <div id="s-crit"   class="layer"><img class="strip" src="public/screenshots/strip-critical.png" alt="critical"></div>
      </div>
      <p id="cap" class="cap">Your session, <span class="hl">in one line.</span></p>
    </div>

    <style>
      [data-composition-id="scene-02-states"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #16161e;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
      }
      [data-composition-id="scene-02-states"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 70px;
      }
      [data-composition-id="scene-02-states"] .stage {
        position: relative; width: 1560px; height: 152px;
        filter: drop-shadow(0 28px 60px rgba(0,0,0,0.55));
      }
      [data-composition-id="scene-02-states"] .layer {
        position: absolute; inset: 0; visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-02-states"] .strip { width: 1560px; height: auto; display: block; }
      [data-composition-id="scene-02-states"] .cap {
        margin: 0; font-size: 50px; font-weight: 400; letter-spacing: -0.5px;
        color: #565f89; visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-02-states"] .hl { color: #c0caf5; font-weight: 600; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // green -> normal -> critical cross-dissolve (outgoing stays until incoming is full)
      tl.fromTo("#s-green",  { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.4, ease: "power1.out" }, 0.1);
      tl.fromTo("#cap",      { y: 16, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.4);
      tl.fromTo("#s-normal", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.5, ease: "power1.inOut" }, 1.7);
      tl.fromTo("#s-crit",   { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.5, ease: "power1.inOut" }, 3.1);
      window.__timelines["scene-02-states"] = tl;
    </script>
  </div>
</template>
