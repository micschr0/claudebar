<template id="scene-00-logo-template">
  <div data-composition-id="scene-00-logo" data-width="1920" data-height="1080">
    <div class="stack">
      <div class="wordmark">
        <span id="w-claude" class="c-claude">claude</span><span id="w-bar" class="c-bar">bar</span>
        <span class="track"><span id="fill" class="fill"></span></span>
      </div>
      <p id="tagline" class="tagline">A fast, themeable statusline for Claude&nbsp;Code.</p>
    </div>

    <style>
      [data-composition-id="scene-00-logo"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #16161e;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
      }
      [data-composition-id="scene-00-logo"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 44px;
      }
      [data-composition-id="scene-00-logo"] .wordmark {
        position: relative;
        font-size: 168px; font-weight: 700; letter-spacing: -3px; line-height: 1.15; padding: 28px 0 14px;
      }
      [data-composition-id="scene-00-logo"] .c-claude { color: #c0caf5; }
      [data-composition-id="scene-00-logo"] .c-bar    { color: #7aa2f7; }
      [data-composition-id="scene-00-logo"] .track {
        position: absolute; left: auto; right: 6px; bottom: -22px;
        width: 250px; height: 14px; border-radius: 7px; background: #2f334d; overflow: hidden;
      }
      [data-composition-id="scene-00-logo"] .fill {
        display: block; height: 100%; width: 100%; border-radius: 7px;
        background: linear-gradient(90deg, #7aa2f7, #7dcfff);
        transform: scaleX(0); transform-origin: left center;
      }
      [data-composition-id="scene-00-logo"] .tagline {
        margin: 0; font-size: 46px; font-weight: 400; letter-spacing: -0.5px;
        color: #565f89; visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-00-logo"] .c-claude,
      [data-composition-id="scene-00-logo"] .c-bar { visibility: hidden; opacity: 0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#w-claude", { y: 40, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.6, ease: "expo.out" }, 0.2);
      tl.fromTo("#w-bar",    { y: 40, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.6, ease: "expo.out" }, 0.45);
      tl.to("#fill", { scaleX: 1, duration: 0.8, ease: "power2.out" }, 0.9);
      tl.fromTo("#tagline", { y: 18, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 1.5);
      window.__timelines["scene-00-logo"] = tl;
    </script>
  </div>
</template>
