<template id="scene-01-strip-template">
  <div data-composition-id="scene-01-strip" data-width="1920" data-height="1080">
    <div class="stack">
      <div id="stripwrap" class="stripwrap">
        <img class="strip" src="public/screenshots/strip-normal.png" alt="claudebar statusline">
      </div>
      <div class="legend">
        <span id="l0" class="seg s-dir">directory</span>
        <span id="l1" class="seg s-git">git</span>
        <span id="l2" class="seg s-mdl">model</span>
        <span id="l3" class="seg s-ctx">context</span>
      </div>
      <div class="legend">
        <span id="l4" class="seg s-lns">lines</span>
        <span id="l5" class="seg s-rl">rate-limits</span>
        <span id="l6" class="seg s-cst">cost</span>
        <span id="l7" class="seg s-dur">duration</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene-01-strip"] {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; gap: 28px;
        background: #16161e;
        font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      }
      [data-composition-id="scene-01-strip"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 40px;
      }
      [data-composition-id="scene-01-strip"] .stripwrap {
        visibility: hidden; opacity: 0;
        filter: drop-shadow(0 28px 60px rgba(0,0,0,0.55));
      }
      [data-composition-id="scene-01-strip"] .strip { width: 1560px; height: auto; display: block; }
      [data-composition-id="scene-01-strip"] .legend {
        display: flex; gap: 22px; font-size: 34px; font-weight: 500;
      }
      [data-composition-id="scene-01-strip"] .seg {
        visibility: hidden; opacity: 0;
        padding: 8px 22px; border-radius: 999px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      }
      [data-composition-id="scene-01-strip"] .s-dir { color: #7aa2f7; }
      [data-composition-id="scene-01-strip"] .s-git { color: #f7768e; }
      [data-composition-id="scene-01-strip"] .s-mdl { color: #ff9e64; }
      [data-composition-id="scene-01-strip"] .s-ctx { color: #e0af68; }
      [data-composition-id="scene-01-strip"] .s-lns { color: #bb9af7; }
      [data-composition-id="scene-01-strip"] .s-rl { color: #9ece6a; }
      [data-composition-id="scene-01-strip"] .s-cst { color: #7dcfff; }
      [data-composition-id="scene-01-strip"] .s-dur { color: #c0caf5; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#stripwrap", { y: 50, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.7, ease: "expo.out" }, 0.2);
      tl.fromTo(["#l0","#l1","#l2","#l3","#l4","#l5","#l6","#l7"],
        { y: 20, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out", stagger: 0.10 }, 1.0);
      window.__timelines["scene-01-strip"] = tl;
    </script>
  </div>
</template>
