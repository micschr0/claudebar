<template id="scene-01-strip-template">
  <div data-composition-id="scene-01-strip" data-width="1920" data-height="1080">
    <div class="stack">
      <div id="stripwrap" class="stripwrap">
        <div id="strip-stage"><img class="strip" src="public/screenshots/strip-all.png" alt="claudebar statusline"></div>
      </div>

      <!-- Row 1: segments 1-4, revealed when strip pans left -->
      <div id="r1" class="legend">
        <span id="p0" class="seg s0">directory</span>
        <span id="p1" class="seg s1">git</span>
        <span id="p2" class="seg s2">stash</span>
        <span id="p3" class="seg s3">model</span>
      </div>

      <!-- Row 2: segments 5-8, revealed when strip pans middle -->
      <div id="r2" class="legend">
        <span id="p4" class="seg s4">context</span>
        <span id="p5" class="seg s5">rate‑limits</span>
        <span id="p6" class="seg s6">burn</span>
        <span id="p7" class="seg s7">dev‑context</span>
      </div>

      <!-- Row 3: segments 9-12, revealed when strip pans right -->
      <div id="r3" class="legend">
        <span id="p8"  class="seg s8">clock</span>
        <span id="p9"  class="seg s9">lines</span>
        <span id="p10" class="seg s10">cost</span>
        <span id="p11" class="seg s11">duration</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene-01-strip"] {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center;
        background: #16161e;
        font-family: "Inter", "SF Pro Display", system-ui, sans-serif;
      }
      [data-composition-id="scene-01-strip"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 38px;
      }

      /* ── Strip ────────────────────────────────────── */
      [data-composition-id="scene-01-strip"] .stripwrap {
        width: 1750px; overflow: hidden;
        visibility: hidden; opacity: 0;
        filter: drop-shadow(0 0 40px rgba(122,162,247,0.15));
      }
      [data-composition-id="scene-01-strip"] .strip-stage { width: 1750px; }
      [data-composition-id="scene-01-strip"] .strip { width: 1750px; height: auto; display: block; }

      /* ── Legend rows ──────────────────────────────── */
      [data-composition-id="scene-01-strip"] .legend {
        display: flex; justify-content: center; gap: 16px;
        width: 1750px; max-width: 94%;
        visibility: hidden; opacity: 0;
      }

      /* ── Pills ────────────────────────────────────── */
      [data-composition-id="scene-01-strip"] .seg {
        flex: 1; max-width: 380px; min-width: 200px;
        padding: 16px 24px; border-radius: 14px;
        text-align: center;
        font-size: 26px; font-weight: 600; line-height: 1.3;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.12);
        visibility: hidden; opacity: 0;
      }

      /* ── 12 unique colors from Tokyo Night ────────── */
      [data-composition-id="scene-01-strip"] .s0  { color: #7aa2f7; border-top: 4px solid #7aa2f7; }
      [data-composition-id="scene-01-strip"] .s1  { color: #f7768e; border-top: 4px solid #f7768e; }
      [data-composition-id="scene-01-strip"] .s2  { color: #bb9af7; border-top: 4px solid #bb9af7; }
      [data-composition-id="scene-01-strip"] .s3  { color: #ff9e64; border-top: 4px solid #ff9e64; }
      [data-composition-id="scene-01-strip"] .s4  { color: #e0af68; border-top: 4px solid #e0af68; }
      [data-composition-id="scene-01-strip"] .s5  { color: #9ece6a; border-top: 4px solid #9ece6a; }
      [data-composition-id="scene-01-strip"] .s6  { color: #7dcfff; border-top: 4px solid #7dcfff; }
      [data-composition-id="scene-01-strip"] .s7  { color: #bb9af7; border-top: 4px solid #bb9af7; }
      [data-composition-id="scene-01-strip"] .s8  { color: #73daca; border-top: 4px solid #73daca; }
      [data-composition-id="scene-01-strip"] .s9  { color: #c0caf5; border-top: 4px solid #c0caf5; }
      [data-composition-id="scene-01-strip"] .s10 { color: #89b4fa; border-top: 4px solid #89b4fa; }
      [data-composition-id="scene-01-strip"] .s11 { color: #a9b1d6; border-top: 4px solid #a9b1d6; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ── Beat 0: Establishing shot (0.0–0.65s) ────── */
      // Full strip fades in at scale 1 — viewer sees the whole product first
      tl.fromTo("#stripwrap", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 0.0);
      // Gentle idle pulse while establishing
      tl.to("#strip-stage", { scale: 1.03, duration: 0.3, ease: "power1.inOut" }, 0.3);
      tl.to("#strip-stage", { scale: 1.0, duration: 0.2, ease: "power1.out" }, 0.6);

      /* ── Beat 1: Zoom left (0.65–1.1s) ───────────── */
      tl.to("#strip-stage", { scale: 2.2, x: 0, duration: 0.45, ease: "power3.out" }, 0.65);
      // R1 pills fade in synced to left position
      tl.fromTo("#r1", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.25 }, 0.8);
      tl.fromTo(["#p0","#p1","#p2","#p3"],
        { y: 12, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.25, ease: "power2.out", stagger: 0.05 }, 0.85);

      /* ── Beat 2: Pan middle (1.5–1.95s) ──────────── */
      tl.to("#strip-stage", { x: -1250, duration: 0.45, ease: "power3.inOut" }, 1.5);
      // R2 pills appear synced to middle position
      tl.fromTo("#r2", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.25 }, 1.55);
      tl.fromTo(["#p4","#p5","#p6","#p7"],
        { y: 12, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.25, ease: "power2.out", stagger: 0.05 }, 1.6);

      /* ── Beat 3: Pan right (2.3–2.75s) ───────────── */
      tl.to("#strip-stage", { x: -2100, duration: 0.45, ease: "power3.inOut" }, 2.3);
      // R3 pills appear synced to right position
      tl.fromTo("#r3", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.25 }, 2.35);
      tl.fromTo(["#p8","#p9","#p10","#p11"],
        { y: 12, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.25, ease: "power2.out", stagger: 0.05 }, 2.4);

      /* ── Beat 4: Slide back + zoom out (4.0–5.0s) ── */
      // Slide back to center first
      tl.to("#strip-stage", { x: 0, duration: 0.35, ease: "power2.in" }, 4.0);
      // Then zoom out to full strip
      tl.to("#strip-stage", { scale: 1, duration: 0.55, ease: "power3.out" }, 4.35);

      window.__timelines["scene-01-strip"] = tl;
    </script>
  </div>
</template>
