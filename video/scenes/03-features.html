<template id="scene-03-features-template">
  <div data-composition-id="scene-03-features" data-width="1920" data-height="1080">
    <div class="stack">
      <h2 id="ftitle" class="ftitle">What it tracks.</h2>

      <div class="grid">
        <span id="c0" class="chip"><b class="dot c-cyn"></b> context — bar + percentage, color-coded</span>
        <span id="c1" class="chip"><b class="dot c-ylw"></b> rate-limits — 5h + weekly countdowns</span>
        <span id="c2" class="chip"><b class="dot c-org"></b> burn — pace to limit, eta projection</span>
        <span id="c3" class="chip"><b class="dot c-mag"></b> dev-context — PR, worktree, sub-agent</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene-03-features"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #16161e;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
      }
      [data-composition-id="scene-03-features"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 56px;
      }
      [data-composition-id="scene-03-features"] .ftitle {
        margin: 0; font-size: 78px; font-weight: 600; letter-spacing: -2px; color: #c0caf5;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-03-features"] .grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px 36px;
        align-items: start; justify-content: center;
        max-width: 1520px;
      }
      [data-composition-id="scene-03-features"] .chip {
        display: flex; align-items: center; gap: 18px;
        font-size: 36px; font-weight: 450; color: #9aa5ce; line-height: 1.25;
        padding: 28px 36px; border-radius: 16px;
        background: rgba(122,162,247,0.07); border: 1px solid rgba(122,162,247,0.16);
        visibility: hidden; opacity: 0;
        max-width: 700px;
      }
      [data-composition-id="scene-03-features"] .dot {
        flex: none; width: 22px; height: 22px; border-radius: 7px; display: inline-block;
      }
      [data-composition-id="scene-03-features"] .c-cyn { background: #7dcfff; }
      [data-composition-id="scene-03-features"] .c-ylw { background: #e0af68; }
      [data-composition-id="scene-03-features"] .c-org { background: #ff9e64; }
      [data-composition-id="scene-03-features"] .c-mag { background: #bb9af7; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const root = "[data-composition-id='scene-03-features']";

      // Title fades in at 0.1s
      tl.fromTo("#ftitle", { y: 28, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "expo.out" }, 0.1);

      // 4 chips stagger in at 0.4s, 0.25s apart — last lands at 1.5s (5.5s visible)
      tl.fromTo(root + " .chip",
        { y: 20, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out", stagger: 0.25 }, 0.4);

      window.__timelines["scene-03-features"] = tl;
    </script>
  </div>
</template>
