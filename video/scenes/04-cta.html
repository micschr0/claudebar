<template id="scene-04-cta-template">
  <div data-composition-id="scene-04-cta" data-width="1920" data-height="1080">
    <div class="stack">
      <div id="wm" class="wordmark"><span class="c-claude">claude</span><span class="c-bar">bar</span></div>
      <img id="shot" class="shot" src="public/screenshots/strip-normal.png" alt="claudebar statusline">
      <p id="repo" class="repo">github.com/micschr0/claudebar</p>
    </div>

    <style>
      [data-composition-id="scene-04-cta"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #16161e;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
      }
      [data-composition-id="scene-04-cta"] .stack {
        display: flex; flex-direction: column; align-items: center; gap: 56px;
      }
      [data-composition-id="scene-04-cta"] .wordmark {
        font-size: 150px; font-weight: 700; letter-spacing: -3px; line-height: 1.15; padding: 16px 0 6px;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-04-cta"] .c-claude { color: #c0caf5; }
      [data-composition-id="scene-04-cta"] .c-bar    { color: #7aa2f7; }
      [data-composition-id="scene-04-cta"] .shot {
        display: block; width: 1700px; height: auto; border-radius: 12px;
        filter: drop-shadow(0 28px 60px rgba(0,0,0,0.55));
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-04-cta"] .repo {
        margin: 0; font-size: 52px; font-weight: 600; color: #7dcfff; letter-spacing: -0.5px;
        font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
        visibility: hidden; opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#wm",   { y: 30, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.5, ease: "expo.out" }, 0.1);
      tl.fromTo("#shot", { y: 24, scale: 0.97, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.55);
      tl.fromTo("#repo", { y: 14, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 1.1);
      window.__timelines["scene-04-cta"] = tl;
    </script>
  </div>
</template>
