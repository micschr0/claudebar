<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>claudebar — promo</title>
  <style>

    html, body { margin: 0; padding: 0; background: #16161e; overflow: hidden; }

    /* Subtle radial background pulse — 6s cycle, barely visible */
    #bg-pulse {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(122,162,247,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!--
    claudebar promo. Silent (on-screen text only). 6 scenes, 27.6s, 16:9 1920×1080.
    Each scene's data-duration extends 0.4s past its nominal end; the next scene
    starts at that nominal boundary and fades 0→1 over the 0.4s crossfade.
    Last scene (CTA) holds to t=30 for clean looping.
  -->
  <div id="bg-pulse"></div>

  <div id="root"
       data-composition-id="main"
       data-width="1920"
       data-height="1080"
       data-start="0"
       data-duration="27.6">

    <div data-composition-id="scene-00-logo"
         data-composition-src="scenes/00-logo.html"
         data-start="0"    data-duration="3.5"  data-track-index="1"></div>

    <div data-composition-id="scene-01-strip"
         data-composition-src="scenes/01-strip.html"
         data-start="3.1"  data-duration="6.4"  data-track-index="2"
         style="opacity:0"></div>

    <div data-composition-id="scene-02-live"
         data-composition-src="scenes/02-live-states.html"
         data-start="9.1"  data-duration="5.9"  data-track-index="3"
         style="opacity:0"></div>

    <div data-composition-id="scene-03-features"
         data-composition-src="scenes/03-features.html"
         data-start="14.6" data-duration="5.0"  data-track-index="4"
         style="opacity:0"></div>

    <div data-composition-id="scene-04-speed"
         data-composition-src="scenes/04-speed.html"
         data-start="19.2" data-duration="4.9"  data-track-index="5"
         style="opacity:0"></div>

    <div data-composition-id="scene-05-cta"
         data-composition-src="scenes/05-cta.html"
         data-start="23.7" data-duration="3.9"  data-track-index="6"
         style="opacity:0"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* ── Background pulse ────────────────────────────────────── */
    tl.fromTo("#bg-pulse", { autoAlpha: 0 }, { autoAlpha: 1, duration: 2, ease: "power1.inOut" }, 0);
    tl.to("#bg-pulse", { autoAlpha: 0.3, duration: 3, ease: "sine.inOut" }, 3);
    tl.to("#bg-pulse", { autoAlpha: 0.6, duration: 3, ease: "sine.inOut" }, 9);
    tl.to("#bg-pulse", { autoAlpha: 0.3, duration: 3, ease: "sine.inOut" }, 14.5);
    tl.to("#bg-pulse", { autoAlpha: 0.6, duration: 3, ease: "sine.inOut" }, 19);
    tl.to("#bg-pulse", { autoAlpha: 0.2, duration: 3, ease: "sine.inOut" }, 23.5);

    /* ── Scene transitions — incoming fade-in + outgoing scale push ── */
    const transitions = [
      { id: "scene-01-strip",    t: 3.1  },
      { id: "scene-02-live",     t: 9.1  },
      { id: "scene-03-features", t: 14.6 },
      { id: "scene-04-speed",    t: 19.2 },
      { id: "scene-05-cta",      t: 23.7 },
    ];

    transitions.forEach(({id, t}) => {
      // Incoming scene fades in over 0.4s
      tl.to(`[data-composition-id="${id}"]`, { opacity: 1, duration: 0.4, ease: "power2.inOut" }, t);
    });

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
